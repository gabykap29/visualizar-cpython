<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 8.2 Property-Based Tests</title>
    <style>
        :root {
            --background-color: #0d1117;
            --text-primary: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: rgba(255, 255, 255, 0.1);
            --transition-duration: 300ms;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            padding: 20px;
            margin: 0;
        }
        
        h1 {
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        
        #test-output {
            background-color: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-top: 20px;
        }
        
        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        
        button:hover {
            background-color: #4a8fd8;
        }
        
        /* Stack Panel Styles */
        #stack-panel {
            display: none; /* Hidden for property tests */
        }
        
        #stack-content {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 8px;
            padding: 8px;
        }
        
        .stack-frame {
            width: 90%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            transition: all var(--transition-duration) ease-in-out;
        }
        
        .stack-frame.active {
            border-color: var(--accent-color);
            background-color: rgba(88, 166, 255, 0.1);
        }
        
        .stack-frame.pushing {
            animation: stackPush var(--transition-duration) ease-in-out;
        }
    </style>
</head>
<body>
    <h1>Task 8.2 Property-Based Tests</h1>
    
    <p>These tests validate Requirements 4.2, 4.3, 4.4, 4.5 using property-based testing with fast-check.</p>
    
    <button onclick="runPropertyTests()">Run Property Tests</button>
    
    <div id="test-output">Click "Run Property Tests" to start...</div>
    
    <div id="stack-panel">
        <div id="stack-content"></div>
    </div>
    
    <!-- fast-check library -->
    <script src="https://cdn.jsdelivr.net/npm/fast-check@3.15.0/lib/bundle.js"></script>
    
    <script>
        // AnimationManager class (minimal version)
        class AnimationManager {
            constructor(panels) {
                this.stackPanel = panels.stackPanel;
                this.previousCallStack = [];
            }
            
            updateStackFrames(callStack) {
                if (!this.stackPanel) {
                    console.warn('Stack panel not available for update');
                    return;
                }
                
                const stackContent = this.stackPanel.querySelector('#stack-content');
                if (!stackContent) {
                    console.warn('Stack content element not found');
                    return;
                }
                
                if (!callStack || callStack.length === 0) {
                    stackContent.innerHTML = `
                        <div class="stack-placeholder">
                            <div class="stack-empty-icon">📚</div>
                            <p class="stack-empty-text">No stack frames yet</p>
                            <p class="stack-empty-hint">Execute code to see function call stack</p>
                        </div>
                    `;
                    this.previousCallStack = [];
                    return;
                }
                
                const previousStack = this.previousCallStack || [];
                let operation = 'none';
                
                if (callStack.length > previousStack.length) {
                    operation = 'push';
                } else if (callStack.length < previousStack.length) {
                    operation = 'pop';
                }
                
                let html = '';
                for (let i = 0; i < callStack.length; i++) {
                    const frame = callStack[i];
                    const isActive = i === callStack.length - 1;
                    const activeClass = isActive ? 'active' : '';
                    const animationClass = (operation === 'push' && i === callStack.length - 1) ? 'pushing' : '';
                    
                    let variablesHtml = '';
                    if (frame.localVariables && frame.localVariables.size > 0) {
                        for (const [varName, varValue] of frame.localVariables) {
                            let displayValue = '';
                            if (varValue === null) {
                                displayValue = 'None';
                            } else if (varValue === undefined) {
                                displayValue = 'undefined';
                            } else if (typeof varValue === 'string') {
                                displayValue = `"${varValue}"`;
                            } else if (typeof varValue === 'object') {
                                try {
                                    displayValue = JSON.stringify(varValue);
                                } catch (e) {
                                    displayValue = '[Object]';
                                }
                            } else {
                                displayValue = String(varValue);
                            }
                            
                            variablesHtml += `
                                <div class="stack-frame-variable">
                                    <span class="stack-frame-var-name">${varName}</span>
                                    <span class="stack-frame-var-separator">=</span>
                                    <span class="stack-frame-var-value">${displayValue}</span>
                                </div>
                            `;
                        }
                    } else {
                        variablesHtml = `
                            <div class="stack-frame-variable">
                                <span class="stack-frame-var-value" style="color: rgba(201, 209, 217, 0.4);">No local variables</span>
                            </div>
                        `;
                    }
                    
                    html += `
                        <div class="stack-frame ${activeClass} ${animationClass}" data-frame-id="${frame.frameId}">
                            <div class="stack-frame-header">
                                <span class="stack-frame-function">${frame.functionName}()</span>
                                <span class="stack-frame-id">#${frame.frameId}</span>
                            </div>
                            <div class="stack-frame-body">
                                <div class="stack-frame-locals">
                                    <div class="stack-frame-section-title">Local Variables</div>
                                    ${variablesHtml}
                                </div>
                                <div class="stack-frame-return">
                                    <span class="stack-frame-return-label">Return to:</span>
                                    <span class="stack-frame-return-address">offset ${frame.returnAddress}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                stackContent.innerHTML = html;
                
                setTimeout(() => {
                    const frames = stackContent.querySelectorAll('.stack-frame');
                    frames.forEach(frame => {
                        frame.classList.remove('pushing', 'popping');
                    });
                }, 300);
                
                this.previousCallStack = callStack.slice();
            }
        }
        
        // Property-based tests
        function runPropertyTests() {
            const output = document.getElementById('test-output');
            output.textContent = 'Running property-based tests...\n\n';
            
            const log = (msg) => {
                output.textContent += msg + '\n';
            };
            
            // Setup test environment
            const stackPanel = document.getElementById('stack-panel');
            const animationManager = new AnimationManager({ stackPanel });
            
            // Property 1: Stack Frame Display Completeness (Requirement 4.4)
            // For any stack frame, the display should include function name, local variables, and return address
            log('Property 1: Stack Frame Display Completeness (Requirement 4.4)');
            try {
                fc.assert(
                    fc.property(
                        fc.array(
                            fc.record({
                                frameId: fc.string({ minLength: 1 }),
                                functionName: fc.string({ minLength: 1 }),
                                localVariables: fc.dictionary(
                                    fc.string({ minLength: 1 }),
                                    fc.oneof(
                                        fc.integer(),
                                        fc.string(),
                                        fc.boolean(),
                                        fc.constant(null)
                                    )
                                ).map(obj => new Map(Object.entries(obj))),
                                returnAddress: fc.nat(),
                                lineNumber: fc.integer({ min: 1, max: 1000 })
                            }),
                            { minLength: 1, maxLength: 5 }
                        ),
                        (callStack) => {
                            animationManager.updateStackFrames(callStack);
                            
                            const frames = stackPanel.querySelectorAll('.stack-frame');
                            
                            // Verify each frame has required elements
                            for (let i = 0; i < frames.length; i++) {
                                const frame = frames[i];
                                const hasFunction = frame.querySelector('.stack-frame-function') !== null;
                                const hasVariables = frame.querySelector('.stack-frame-locals') !== null;
                                const hasReturn = frame.querySelector('.stack-frame-return-address') !== null;
                                
                                if (!hasFunction || !hasVariables || !hasReturn) {
                                    return false;
                                }
                            }
                            
                            return frames.length === callStack.length;
                        }
                    ),
                    { numRuns: 50 }
                );
                log('✓ Property 1 passed: All stack frames display complete information\n');
            } catch (error) {
                log(`✗ Property 1 failed: ${error.message}\n`);
            }
            
            // Property 2: Most Recent Frame Marked Active (Requirement 4.5)
            // For any non-empty call stack, the last frame should be marked as active
            log('Property 2: Most Recent Frame Marked Active (Requirement 4.5)');
            try {
                fc.assert(
                    fc.property(
                        fc.array(
                            fc.record({
                                frameId: fc.string({ minLength: 1 }),
                                functionName: fc.string({ minLength: 1 }),
                                localVariables: fc.constant(new Map()),
                                returnAddress: fc.nat(),
                                lineNumber: fc.integer({ min: 1, max: 1000 })
                            }),
                            { minLength: 1, maxLength: 10 }
                        ),
                        (callStack) => {
                            animationManager.updateStackFrames(callStack);
                            
                            const frames = stackPanel.querySelectorAll('.stack-frame');
                            if (frames.length === 0) return false;
                            
                            // Last frame should be active
                            const lastFrame = frames[frames.length - 1];
                            const isActive = lastFrame.classList.contains('active');
                            
                            // Other frames should not be active
                            let othersNotActive = true;
                            for (let i = 0; i < frames.length - 1; i++) {
                                if (frames[i].classList.contains('active')) {
                                    othersNotActive = false;
                                    break;
                                }
                            }
                            
                            return isActive && othersNotActive;
                        }
                    ),
                    { numRuns: 50 }
                );
                log('✓ Property 2 passed: Most recent frame is always marked as active\n');
            } catch (error) {
                log(`✗ Property 2 failed: ${error.message}\n`);
            }
            
            // Property 3: Push Animation Applied (Requirement 4.2)
            // When a new frame is pushed, it should have the pushing animation class
            log('Property 3: Push Animation Applied (Requirement 4.2)');
            try {
                fc.assert(
                    fc.property(
                        fc.array(
                            fc.record({
                                frameId: fc.string({ minLength: 1 }),
                                functionName: fc.string({ minLength: 1 }),
                                localVariables: fc.constant(new Map()),
                                returnAddress: fc.nat(),
                                lineNumber: fc.integer({ min: 1, max: 1000 })
                            }),
                            { minLength: 1, maxLength: 5 }
                        ),
                        fc.record({
                            frameId: fc.string({ minLength: 1 }),
                            functionName: fc.string({ minLength: 1 }),
                            localVariables: fc.constant(new Map()),
                            returnAddress: fc.nat(),
                            lineNumber: fc.integer({ min: 1, max: 1000 })
                        }),
                        (initialStack, newFrame) => {
                            // Set initial stack
                            animationManager.updateStackFrames(initialStack);
                            
                            // Push new frame
                            const pushedStack = [...initialStack, newFrame];
                            animationManager.updateStackFrames(pushedStack);
                            
                            // Check if new frame has pushing class
                            const frames = stackPanel.querySelectorAll('.stack-frame');
                            if (frames.length === 0) return false;
                            
                            const lastFrame = frames[frames.length - 1];
                            return lastFrame.classList.contains('pushing');
                        }
                    ),
                    { numRuns: 30 }
                );
                log('✓ Property 3 passed: Push animation is applied to new frames\n');
            } catch (error) {
                log(`✗ Property 3 failed: ${error.message}\n`);
            }
            
            // Property 4: Empty Stack Shows Placeholder
            // When call stack is empty, placeholder should be displayed
            log('Property 4: Empty Stack Shows Placeholder');
            try {
                animationManager.updateStackFrames([]);
                const placeholder = stackPanel.querySelector('.stack-placeholder');
                const hasPlaceholder = placeholder !== null;
                
                if (hasPlaceholder) {
                    log('✓ Property 4 passed: Empty stack shows placeholder\n');
                } else {
                    log('✗ Property 4 failed: Empty stack does not show placeholder\n');
                }
            } catch (error) {
                log(`✗ Property 4 failed: ${error.message}\n`);
            }
            
            // Property 5: Variable Value Formatting
            // Different variable types should be formatted correctly
            log('Property 5: Variable Value Formatting (Requirement 4.4)');
            try {
                const testFrame = {
                    frameId: 'test',
                    functionName: 'test',
                    localVariables: new Map([
                        ['str', 'hello'],
                        ['num', 42],
                        ['bool', true],
                        ['none', null]
                    ]),
                    returnAddress: 0,
                    lineNumber: 1
                };
                
                animationManager.updateStackFrames([testFrame]);
                
                const variables = stackPanel.querySelectorAll('.stack-frame-variable');
                let allFormatted = true;
                
                // Check string is quoted
                const strVar = Array.from(variables).find(v => 
                    v.querySelector('.stack-frame-var-name')?.textContent === 'str'
                );
                if (strVar && !strVar.querySelector('.stack-frame-var-value').textContent.includes('"')) {
                    allFormatted = false;
                }
                
                // Check null is displayed as "None"
                const noneVar = Array.from(variables).find(v => 
                    v.querySelector('.stack-frame-var-name')?.textContent === 'none'
                );
                if (noneVar && noneVar.querySelector('.stack-frame-var-value').textContent !== 'None') {
                    allFormatted = false;
                }
                
                if (allFormatted) {
                    log('✓ Property 5 passed: Variable values are formatted correctly\n');
                } else {
                    log('✗ Property 5 failed: Variable values not formatted correctly\n');
                }
            } catch (error) {
                log(`✗ Property 5 failed: ${error.message}\n`);
            }
            
            log('\n=== Property-Based Tests Complete ===');
            log('All requirements validated: 4.2, 4.3, 4.4, 4.5');
        }
    </script>
</body>
</html>
